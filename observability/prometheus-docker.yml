# ============================================
# Prometheus - Configuração para Docker Compose
# Usa os nomes dos serviços na rede Docker
# ============================================

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'eureka-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['eureka-server-1:8761', 'eureka-server-2:8761', 'eureka-server-3:8761']

  - job_name: 'config-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['config-server:8888']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'coordinator-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['coordinator-service:8081']

  - job_name: 'ai-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ai-service:8082']

  - job_name: 'function-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['function-service:8083']
