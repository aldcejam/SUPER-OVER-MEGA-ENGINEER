version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: supersys-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: supersys_db
      POSTGRES_USER: supersys_user
      POSTGRES_PASSWORD: supersys_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supersys_user -d supersys_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: supersys-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: supersys-zipkin
    ports:
      - "9411:9411"

  grafana:
    image: grafana/grafana:latest
    container_name: supersys-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  pgdata:
