server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/supersys-relational-db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  graphql:
    graphiql:
      enabled: true
      path: /graphiql

services:
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8082}
  lambda-service:
    url: ${LAMBDA_SERVICE_URL:http://localhost:8086}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name:project-analysis}