server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/supersys-relational-db
    username: postgres
    password: postgresf
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  graphql:
    graphiql:
      enabled: true
      path: /graphiql

management:
  endpoints:
    web:
      exposure:
        include: "*"