server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/supersys_vector_db
    username: apm
    password: super_password_2026
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:placeholder_api_key}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-flash
    vectorstore:
      pgvector:
        table-name: vector_store
        dimension: 384
        initialize-schema: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name:ai-service}

resilience4j:
  ratelimiter:
    instances:
      aiAnalysisLimiter:
        limitForPeriod: 3
        limitRefreshPeriod: 30s
        timeoutDuration: 0s
  circuitbreaker:
    instances:
      aiAnalysisBreaker:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        ignoreExceptions:
          - io.github.resilience4j.ratelimiter.RequestNotPermitted

