server:
  port: 8082

spring:
  application:
    name: ai-service
  datasource:
    url: jdbc:postgresql://postgres:5432/supersys_vector_db
    username: apm
    password: super_password_2026
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:placeholder_api_key}
    vectorstore:
      pgvector:
        table-name: vector_store
        dimension: 768
        initialize-schema: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
