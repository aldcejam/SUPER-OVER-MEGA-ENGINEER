server:
  port: 8082

spring:
  application:
    name: ai-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/supersys_vector_db}
    username: ${SPRING_DATASOURCE_USERNAME:apm}
    password: ${SPRING_DATASOURCE_PASSWORD:super_password_2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:placeholder_api_key}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
    vectorstore:
      pgvector:
        table-name: vector_store
        dimension: 384
        initialize-schema: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

resilience4j:
  ratelimiter:
    instances:
      aiAnalysisLimiter:
        limitForPeriod: 3
        limitRefreshPeriod: 30s
        timeoutDuration: 0s
  circuitbreaker:
    instances:
      aiAnalysisBreaker:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        ignoreExceptions:
          - io.github.resilience4j.ratelimiter.RequestNotPermitted

