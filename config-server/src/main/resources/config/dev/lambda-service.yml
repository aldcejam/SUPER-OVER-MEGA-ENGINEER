server:
  port: 8086

spring:
  cloud:
    function:
      definition: lambdaService
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-vector:5432/supersys_vector_db}
    username: ${SPRING_DATASOURCE_USERNAME:apm}
    password: ${SPRING_DATASOURCE_PASSWORD:super_password_2026}
  ai:
    vectorstore:
      pgvector:
        table-name: vector_store
        dimension: 384
        initialize-schema: true

services:
  ai-service:
    url: ${AI_SERVICE_URL:http://ai-service:8082}
  lambda-service:
    url: ${LAMBDA_SERVICE_URL:http://lambda-service:8080}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name:lambda-service}
