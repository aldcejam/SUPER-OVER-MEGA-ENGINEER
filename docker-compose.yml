# ============================================
# TEMPLATES (YAML Anchors)
# ============================================
x-common-env: &common-env
  # Relational DB
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/supersys-relational-db
  SPRING_DATASOURCE_USERNAME: ${POSTGRES_RELATIONAL_USER:-postgres}
  SPRING_DATASOURCE_PASSWORD: ${POSTGRES_RELATIONAL_PASSWORD:-postgres}
  
  # Vector DB (for services to override if needed)
  SPRING_DATASOURCE_URL_VECTOR: jdbc:postgresql://postgres-vector:5432/supersys_vector_db
  SPRING_DATASOURCE_USERNAME_VECTOR: ${POSTGRES_VECTOR_USER:-apm}
  SPRING_DATASOURCE_PASSWORD_VECTOR: ${POSTGRES_VECTOR_PASSWORD:-super_password_2026}

x-eureka-base: &eureka-base
  build:
    context: ./eureka-server
    dockerfile: ../Dockerfile
  depends_on:
    config-server:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
    interval: 10s
    timeout: 5s
    retries: 10
    start_period: 30s
  networks:
    - supersys-net
  environment:
    <<: *common-env
    SPRING_PROFILES_ACTIVE: dev
    SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
  profiles: 
    - discovery
    - infra

services:

  # ============================================
  # INFRAESTRUTURA
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: supersys-postgres-relational
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_RELATIONAL_DB:-supersys-relational-db}
      POSTGRES_USER: ${POSTGRES_RELATIONAL_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_RELATIONAL_PASSWORD:-postgres}
    volumes:
      - pgdata_relational:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_RELATIONAL_USER:-postgres} -d ${POSTGRES_RELATIONAL_DB:-supersys-relational-db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - supersys-net
    profiles:
      - infra

  postgres-vector:
    image: pgvector/pgvector:pg16
    container_name: supersys-postgres-vector
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_VECTOR_DB:-supersys_vector_db}
      POSTGRES_USER: ${POSTGRES_VECTOR_USER:-apm}
      POSTGRES_PASSWORD: ${POSTGRES_VECTOR_PASSWORD:-super_password_2026}
    volumes:
      - pgdata_vector:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_VECTOR_USER:-apm} -d ${POSTGRES_VECTOR_DB:-supersys_vector_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - supersys-net
    profiles:
      - infra

  # ============================================
  # CONFIG SERVER
  # ============================================

  config-server:
    build:
      context: ./config-server
      dockerfile: ../Dockerfile
    container_name: supersys-config-server
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/app/config/{profile}
    volumes:
      - ./config-server/src/main/resources/config:/app/config
    networks:
      - supersys-net
    profiles:
      - discovery
      - infra

  # ============================================
  # EUREKA SERVERS (Service Discovery Cluster)
  # ============================================

  eureka-server-1:
    <<: *eureka-base
    container_name: supersys-eureka-server-1
    ports:
      - "8761:8761"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_INSTANCE_HOSTNAME: eureka-server-1
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server-2:8761/eureka/,http://eureka-server-3:8761/eureka/

  eureka-server-2:
    <<: *eureka-base
    container_name: supersys-eureka-server-2
    ports:
      - "8762:8761"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_INSTANCE_HOSTNAME: eureka-server-2
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server-1:8761/eureka/,http://eureka-server-3:8761/eureka/

  eureka-server-3:
    <<: *eureka-base
    container_name: supersys-eureka-server-3
    ports:
      - "8763:8761"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_INSTANCE_HOSTNAME: eureka-server-3
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server-1:8761/eureka/,http://eureka-server-2:8761/eureka/

  # ============================================
  # API GATEWAY
  # ============================================

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: ../Dockerfile
    container_name: supersys-api-gateway
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
      eureka-server-2:
        condition: service_healthy
      eureka-server-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - supersys-net
    profiles:
      - domain

  # ============================================
  # AI SERVICE
  # ============================================

  ai-service:
    build:
      context: ./ai-service
      dockerfile: ../Dockerfile
    container_name: supersys-ai-service
    ports:
      - "8082:8082"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
      SPRING_AI_MCP_CLIENT_STDIO_CONNECTIONS_GITHUB_COMMAND: "npx"
      SPRING_AI_MCP_CLIENT_STDIO_CONNECTIONS_GITHUB_ARGS_0: "-y"
      SPRING_AI_MCP_CLIENT_STDIO_CONNECTIONS_GITHUB_ARGS_1: "@modelcontextprotocol/server-github"
      SPRING_AI_MCP_CLIENT_STDIO_CONNECTIONS_GITHUB_ENV_GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-vector:5432/supersys_vector_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_VECTOR_USER:-apm}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_VECTOR_PASSWORD:-super_password_2026}
      SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY: test
      SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY: test
      SPRING_CLOUD_AWS_REGION_STATIC: us-east-1
      SPRING_CLOUD_AWS_S3_ENDPOINT: http://supersys-localstack:4566
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
      eureka-server-2:
        condition: service_healthy
      eureka-server-3:
        condition: service_healthy
      postgres-vector:
        condition: service_healthy
    networks:
      - supersys-net
    profiles:
      - domain

  lambda-service:
    build:
      context: ./lambda-service
      dockerfile: ../Dockerfile
    container_name: supersys-lambda-service
    ports:
      - "8086:8086"
    environment:
      <<: *common-env
      SERVER_PORT: 8086
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY: test
      SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY: test
      SPRING_CLOUD_AWS_REGION_STATIC: us-east-1
      SPRING_CLOUD_AWS_SQS_ENDPOINT: http://supersys-localstack:4566
      SPRING_CLOUD_AWS_S3_ENDPOINT: http://supersys-localstack:4566
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-vector:5432/supersys_vector_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_VECTOR_USER:-apm}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_VECTOR_PASSWORD:-super_password_2026}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
      eureka-server-2:
        condition: service_healthy
      eureka-server-3:
        condition: service_healthy
    networks:
      - supersys-net
    profiles:
      - domain



  # ============================================
  # EMPIRE MANAGER ERP
  # ============================================

  project-analysis:
    build:
      context: ./project-analysis
      dockerfile: ../Dockerfile
    container_name: supersys-project-analysis
    ports:
      - "8083:8083"

    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      JAVA_TOOL_OPTIONS: "-javaagent:/app/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "project-analysis"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_METRICS_EXPORTER: "otlp"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_LOGS_EXPORTER: "otlp"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
      eureka-server-2:
        condition: service_healthy
      eureka-server-3:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - supersys-net
    profiles:
      - domain

  # ============================================
  # OBSERVABILIDADE
  # ============================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otel-collector/config.yaml
    command: ["--config=/etc/otel-collector/config.yaml"]
    ports:
      - "4318:4318" # HTTP receiver
    networks:
      - supersys-net
    profiles: 
      - otlp
      - infra

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - supersys-net
    profiles:
      - otlp
      - infra

  tempo:
    image: grafana/tempo:latest
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yaml
    ports:
      - "3200:3200"
    networks:
      - supersys-net
    profiles: 
      - otlp
      - infra

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./observability/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - supersys-net
    profiles: 
      - otlp
      - infra

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - supersys-net
    profiles: 
      - otlp
      - infra

  portainer:
    image: portainer/portainer-ce:latest
    container_name: supersys-portainer
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: always
    networks:
      - supersys-net
    profiles:
      - infra

  # ============================================
  # LOCALSTACK
  # ============================================

  localstack:
    image: localstack/localstack:3.8.0
    container_name: supersys-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - ./localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    networks:
      - supersys-net
    profiles:
      - infra

volumes:
  pgdata_relational:
  pgdata_vector:
  portainer_data:

networks:
  supersys-net:
    driver: bridge
