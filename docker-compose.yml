# ============================================
# TEMPLATES (YAML Anchors)
# ============================================
x-common-env: &common-env
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: 5672
  # Relational DB
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/supersys-relational-db
  SPRING_DATASOURCE_USERNAME: ${POSTGRES_RELATIONAL_USER:-postgres}
  SPRING_DATASOURCE_PASSWORD: ${POSTGRES_RELATIONAL_PASSWORD:-postgres}
  
  # Vector DB (for services to override if needed)
  SPRING_DATASOURCE_URL_VECTOR: jdbc:postgresql://postgres-vector:5432/supersys_vector_db
  SPRING_DATASOURCE_USERNAME_VECTOR: ${POSTGRES_VECTOR_USER:-apm}
  SPRING_DATASOURCE_PASSWORD_VECTOR: ${POSTGRES_VECTOR_PASSWORD:-super_password_2026}

x-eureka-base: &eureka-base
  build:
    context: ./eureka-server
    dockerfile: ../Dockerfile
  depends_on:
    config-server:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
    interval: 10s
    timeout: 5s
    retries: 10
    start_period: 30s
  networks:
    - supersys-net
  environment:
    <<: *common-env
    SPRING_PROFILES_ACTIVE: dev
    SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888

services:

  # ============================================
  # INFRAESTRUTURA
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: supersys-postgres-relational
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_RELATIONAL_DB:-supersys-relational-db}
      POSTGRES_USER: ${POSTGRES_RELATIONAL_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_RELATIONAL_PASSWORD:-postgres}
    volumes:
      - pgdata_relational:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_RELATIONAL_USER:-postgres} -d ${POSTGRES_RELATIONAL_DB:-supersys-relational-db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - supersys-net

  postgres-vector:
    image: pgvector/pgvector:pg16
    container_name: supersys-postgres-vector
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_VECTOR_DB:-supersys_vector_db}
      POSTGRES_USER: ${POSTGRES_VECTOR_USER:-apm}
      POSTGRES_PASSWORD: ${POSTGRES_VECTOR_PASSWORD:-super_password_2026}
    volumes:
      - pgdata_vector:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_VECTOR_USER:-apm} -d ${POSTGRES_VECTOR_DB:-supersys_vector_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - supersys-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: supersys-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supersys-net

  # ============================================
  # CONFIG SERVER
  # ============================================

  config-server:
    build:
      context: ./config-server
      dockerfile: ../Dockerfile
    container_name: supersys-config-server
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - supersys-net

  # ============================================
  # EUREKA SERVERS (Service Discovery Cluster)
  # ============================================

  eureka-server-1:
    <<: *eureka-base
    container_name: supersys-eureka-server-1
    ports:
      - "8761:8761"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_INSTANCE_HOSTNAME: eureka-server-1
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server-2:8761/eureka/,http://eureka-server-3:8761/eureka/

  eureka-server-2:
    <<: *eureka-base
    container_name: supersys-eureka-server-2
    ports:
      - "8762:8761"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_INSTANCE_HOSTNAME: eureka-server-2
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server-1:8761/eureka/,http://eureka-server-3:8761/eureka/

  eureka-server-3:
    <<: *eureka-base
    container_name: supersys-eureka-server-3
    ports:
      - "8763:8761"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_INSTANCE_HOSTNAME: eureka-server-3
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server-1:8761/eureka/,http://eureka-server-2:8761/eureka/


  # ============================================
  # API GATEWAY
  # ============================================

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: ../Dockerfile
    container_name: supersys-api-gateway
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
      eureka-server-2:
        condition: service_healthy
      eureka-server-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - supersys-net

  # ============================================
  # AI SERVICE
  # ============================================

  ai-service:
    build:
      context: ./ai-service
      dockerfile: ../Dockerfile
    container_name: supersys-ai-service
    ports:
      - "8082:8082"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_VECTOR}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME_VECTOR}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD_VECTOR}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
      eureka-server-2:
        condition: service_healthy
      eureka-server-3:
        condition: service_healthy
      postgres-vector:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - supersys-net

  # ============================================
  # EMPIRE MANAGER ERP
  # ============================================

  project-analysis:
    build:
      context: ./project-analysis
      dockerfile: ../Dockerfile
    container_name: supersys-project-analysis
    ports:
      - "8083:8083"

    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
      eureka-server-2:
        condition: service_healthy
      eureka-server-3:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - supersys-net

  # ============================================
  # OBSERVABILIDADE
  # ============================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-config.yaml:/etc/otel-collector/config.yaml
    command: ["--config=/etc/otel-collector/config.yaml"]
    ports:
      - "4318:4318" # HTTP receiver

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:latest
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
  portainer:
    image: portainer/portainer-ce:latest
    container_name: supersys-portainer
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: always
    networks:
      - supersys-net

volumes:
  pgdata_relational:
  pgdata_vector:
  portainer_data:

networks:
  supersys-net:
    driver: bridge
